<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreditFlow | Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-900">
  <main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-900 sm:px-6 lg:px-8">
    <div class="mx-auto grid min-h-[calc(100vh-4rem)] max-w-6xl overflow-hidden rounded-[28px] bg-white shadow-2xl shadow-slate-950/40 lg:grid-cols-[0.9fr_1.1fr]">
      <section class="flex flex-col justify-between bg-slate-950 p-8 text-white sm:p-10">
        <div>
          <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-emerald-400 text-lg font-bold text-slate-950">C</div>
          <p class="mt-6 text-sm uppercase tracking-[0.35em] text-slate-400">CreditFlow</p>
          <h1 class="mt-3 text-3xl font-semibold leading-tight sm:text-4xl">Loan Management Suite</h1>
        </div>

        <div class="mt-12 grid gap-4 sm:grid-cols-3 lg:grid-cols-1">
          <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
            <p class="text-xs uppercase tracking-[0.28em] text-slate-400">Capture</p>
            <p class="mt-2 text-sm text-slate-200">Create borrower records and calculate returns.</p>
          </div>
          <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
            <p class="text-xs uppercase tracking-[0.28em] text-slate-400">Track</p>
            <p class="mt-2 text-sm text-slate-200">Review active loans, payments, and balances.</p>
          </div>
          <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
            <p class="text-xs uppercase tracking-[0.28em] text-slate-400">Manage</p>
            <p class="mt-2 text-sm text-slate-200">Keep desktop and mobile workflows aligned.</p>
          </div>
        </div>
      </section>

      <section class="flex items-center px-5 py-8 sm:px-10 lg:px-16">
        <div class="w-full">
          <p class="text-sm uppercase tracking-[0.32em] text-slate-500">Secure Access</p>
          <h2 class="mt-3 text-3xl font-semibold text-slate-950">Sign in</h2>
          <p class="mt-2 text-sm text-slate-600">Use your CreditFlow admin credentials to continue.</p>

          <div id="login-message" class="mt-5 min-h-[28px] text-sm font-semibold text-red-700" aria-live="polite"></div>

          <form id="login-form" class="mt-3 grid gap-5">
            <div>
              <label class="mb-2 block text-sm font-semibold text-slate-700" for="username">Username</label>
              <input id="username" name="username" type="text" autocomplete="username" required class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
            </div>
            <div>
              <label class="mb-2 block text-sm font-semibold text-slate-700" for="password">Password</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-base text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
            </div>
            <button id="login-submit" type="submit" class="mt-2 w-full rounded-2xl bg-slate-950 px-5 py-3 text-base font-semibold text-white shadow-xl shadow-slate-950/10 transition hover:bg-slate-800">
              Sign in
            </button>
          </form>
        </div>
      </section>
    </div>
  </main>
  <script src="scripts/login.js"></script>
</body>
</html>
