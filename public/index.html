<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreditFlow | Loan Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="min-h-screen">
    <header class="bg-slate-950 text-white">
      <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-6 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="text-sm uppercase tracking-[0.3em] text-slate-400">CreditFlow</p>
          <h1 class="mt-2 text-3xl font-semibold">Loan Management Suite</h1>
          <p class="mt-2 max-w-2xl text-sm text-slate-300">Capture borrowers, calculate return, and manage payments from a clean dashboard experience.</p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <a href="manage.html" class="rounded-full bg-emerald-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-emerald-500/20">Manage Payments</a>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 py-8">
      <div class="grid gap">
        <section class="rounded-[32px] bg-white p-8 shadow-[0_18px_40px_rgba(15,23,42,0.08)]">
          <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
            <div>
              <p class="text-sm uppercase tracking-[0.32em] text-slate-500">Loan Capture</p>
              <h2 class="mt-3 text-3xl font-semibold text-slate-950">Create a new loan</h2>
              <p class="mt-3 max-w-2xl text-slate-600">Enter borrower details and set a return date. The system calculates the 35% premium automatically.</p>
            </div>
            <div class="rounded-[28px] border border-slate-200 bg-slate-50 p-5 text-center">
              <p class="text-sm uppercase tracking-[0.3em] text-slate-500">Interest rate</p>
              <p class="mt-3 text-4xl font-semibold text-slate-950">35%</p>
            </div>
          </div>

          <div id="message-box" class="mt-6 min-h-[28px] text-sm font-semibold text-emerald-600"></div>

          <form id="loan-form" class="mt-6 grid gap-5 sm:grid-cols-2">
            <div>
              <label class="mb-2 block text-sm font-semibold text-slate-700" for="firstName">First Name</label>
              <input id="firstName" name="firstName" type="text" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
            </div>
            <div>
              <label class="mb-2 block text-sm font-semibold text-slate-700" for="lastName">Last Name</label>
              <input id="lastName" name="lastName" type="text" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
            </div>
            <div>
              <label class="mb-2 block text-sm font-semibold text-slate-700" for="amountBorrowed">Amount Borrowed</label>
              <input id="amountBorrowed" name="amountBorrowed" type="number" step="0.01" min="0.01" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
            </div>
            <div>
              <label class="mb-2 block text-sm font-semibold text-slate-700" for="returnDate">Return Date</label>
              <input id="returnDate" name="returnDate" type="date" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
            </div>
            <div class="sm:col-span-2 flex justify-end">
              <button type="submit" class="rounded-full bg-slate-950 px-6 py-3 text-sm font-semibold text-white shadow-xl shadow-slate-950/10 transition hover:bg-slate-800">Save Loan</button>
            </div>
          </form>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
